<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Calculator</title>
</head>
<style>
    html,
    body {
        background-color: rgba(15, 15, 15, 0.5);
    }

    .calculator {
        padding: 40px;
    }

    .container {
        width: 365px;
        border: 1px solid black;
        padding: 20px;
        border-radius: 30px;
        box-shadow: 1px 1px 6px rgb(171, 230, 83);
        background-color: rgb(61, 60, 60);
    }

    .row {
        padding: 20px;
    }

    h1 {
        text-align: center;
        padding: 10px;
        color: chartreuse;
    }

    button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        font-size: 16px;
        font-weight: 500;
        margin: 5px;
        border: none;
        background-color: rgb(84, 83, 83);
        color: aliceblue;
    }

    button:hover {
        box-shadow: 0px 0px 9px greenyellow;
    }

    .buttons {
        padding: 6px;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    input {
        text-align: right;
        font-size: 24px;
        margin-bottom: 20px;
        border-radius: 20px;
        padding: 10px;
        border: none;

    }

    input:hover {
        border: greenyellow;
    }

    .operator {
        background-color: rgba(165, 243, 48, 0.9);
        color: black;
    }

    .equal {
        background-color: rgb(240, 68, 68);
    }

    .equal:hover {
        box-shadow: 0px 0px 9px red;
    }

    .clear {
        color: rgba(180, 248, 78, 0.9);
    }
</style>

<body>
    <div class="calculator">
        <h1>Calculator</h1>
        <div class="container">
            <div class="row ">

                <div class="col-12">
                    <input type="text" placeholder="0" id="display">
                </div>
                <div class="col-12 buttons">
                    <button class="clear" onclick="allclear()">AC</button>
                    <button class="clear" onclick="lastdel()">DE</button>
                    <button class="operator" onclick="inputvalue('%')">%</button>
                    <button class="operator" onclick="inputvalue('/')">/</button>
                </div>
                <div class="col-12 buttons">
                    <button onclick="inputvalue('7')">7</button>
                    <button onclick="inputvalue('8')">8</button>
                    <button onclick="inputvalue('9')">9</button>
                    <button class="operator" onclick="inputvalue('*')">*</button>
                </div>
                <div class="col-12  buttons">
                    <button onclick="inputvalue('4')">4</button>
                    <button onclick="inputvalue('5')">5</button>
                    <button onclick="inputvalue('6')">6</button>
                    <button class="operator" onclick="inputvalue('-')">-</button>
                </div>
                <div class="col-12 buttons">
                    <button onclick="inputvalue('1')">1</button>
                    <button onclick="inputvalue('2')">2</button>
                    <button onclick="inputvalue('3')">3</button>
                    <button class="operator" onclick="inputvalue('+')">+</button>
                </div>
                <div class="col-12 buttons">
                    <button onclick="inputvalue('00')">00</button>
                    <button onclick="inputvalue('0')">0</button>
                    <button onclick="inputvalue('.')">.</button>
                    <button class="equal" onclick="calculate()">=</button>
                </div>


            </div>

        </div>

    </div>

    <script>
        const display = document.getElementById('display');

        function inputvalue(num) {
            if (display.value === "0") {
                display.value = "";
            }
            display.value += num;
        }

        function allclear() {
            display.value = "0";
        }

        function lastdel() {
                display.value = display.value.slice(0, -1);
        }

        function calculate(){
            display.value=eval(display.value);
        }





    </script>
</body>

</html>
